<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Store</title>

  <style>

    body{
      font-family: Arial;
      background:#f4f4f4;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
    }

    .products{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      border-radius:10px;
      padding:20px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:10px;
    }

    .card h3{
      margin-top:15px;
    }

    .card p{
      font-size:20px;
      color:green;
    }

    button{
      background:blue;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:5px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:darkblue;
    }

    .cart-section{
      margin-top:50px;
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
    }

    #cart li{
      margin-bottom:10px;
    }

    #total{
      margin-top:20px;
      color:green;
    }

    .checkout{
      width:100%;
      background:green;
      margin-top:20px;
    }

  </style>

</head>
<body>

  <h1>Simple E-Commerce Store</h1>

  <div class="products">

    <!-- Shoes -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">

      <h3>Shoes</h3>

      <p>₹999</p>

      <button onclick="addToCart('Shoes',999)">
        Add to Cart
      </button>
    </div>

    <!-- Watch -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400">

      <h3>Watch</h3>

      <p>₹1499</p>

      <button onclick="addToCart('Watch',1499)">
        Add to Cart
      </button>
    </div>

    <!-- Phone -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400">

      <h3>Phone</h3>

      <p>₹19999</p>

      <button onclick="addToCart('Phone',19999)">
        Add to Cart
      </button>
    </div>

  </div>

  <!-- Cart -->

  <div class="cart-section">

    <h2>Shopping Cart</h2>

    <ul id="cart"></ul>

    <h3 id="total">Total: ₹0</h3>

    <button class="checkout">
      Checkout
    </button>

  </div>

  <script>

    let total = 0;

    function addToCart(product, price){

      const cart = document.getElementById("cart");

      const li = document.createElement("li");

      li.innerText = product + " - ₹" + price;

      cart.appendChild(li);

      total += price;

      document.getElementById("total").innerText =
      "Total: ₹" + total;
    }

  </script>

</body>
</html>
